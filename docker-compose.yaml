services:
  db1: &mysql_base
    image: mysql/mysql-server:8.0
    networks:
      - cluster-net
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "password"
      MYSQL_ROOT_HOST: "%"
    command:
      [
        "mysqld",
        "--server_id=1",
        "--binlog_checksum=NONE",
        "--gtid_mode=ON",
        "--enforce_gtid_consistency=ON",
        "--master_info_repository=TABLE",
        "--relay_log_info_repository=TABLE",
        "--transaction_write_set_extraction=XXHASH64",
        "--loose-group_replication_group_name=aaaaaaaa-bbbb-cccc-dddd-eeeeeeeeeeee",
        "--default-authentication-plugin=mysql_native_password",
      ]

  db2:
    <<: *mysql_base
    restart: always
    command:
      [
        "mysqld",
        "--server_id=2",
        "--binlog_checksum=NONE",
        "--gtid_mode=ON",
        "--enforce_gtid_consistency=ON",
        "--master_info_repository=TABLE",
        "--relay_log_info_repository=TABLE",
        "--transaction_write_set_extraction=XXHASH64",
        "--default-authentication-plugin=mysql_native_password",
      ]

  db3:
    <<: *mysql_base
    restart: always
    command:
      [
        "mysqld",
        "--server_id=3",
        "--binlog_checksum=NONE",
        "--gtid_mode=ON",
        "--enforce_gtid_consistency=ON",
        "--master_info_repository=TABLE",
        "--relay_log_info_repository=TABLE",
        "--transaction_write_set_extraction=XXHASH64",
        "--default-authentication-plugin=mysql_native_password",
      ]

  cluster-setup:
    build: .
    networks: [cluster-net]
    depends_on: [db1, db2, db3]

  router:
    image: mysql/mysql-router:8.0
    networks:
      - cluster-net
    ports:
      - "6446:6446" # RW Port
      - "6447:6447" # RO Port
      - "6448:6448"
    environment:
      MYSQL_HOST: db1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: "password"

    depends_on:
      cluster-setup:
        condition: service_completed_successfully

  phpmyadmin:
    image: phpmyadmin
    networks:
      - cluster-net
    container_name: phpmyadmin
    links:
      - router
    environment:
      - PMA_HOST=router
      - PMA_PORT=6446
      - PMA_USER=root
      - PMA_PASSWORD=password
    ports:
      - "8080:80"
    depends_on:
      router:
        condition: service_healthy
networks:
  cluster-net:
    driver: bridge
